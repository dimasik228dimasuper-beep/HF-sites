<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HF Sites — конструктор сайтов</title>
    <style>
        /* ── ОСНОВНЫЕ СТИЛИ ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0f;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 20px;
        }

        /* ── ШАПКА ── */
        .header {
            max-width: 1400px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #14141e;
            border-radius: 16px;
            border: 1px solid #2a2a3a;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 30px;
            -webkit-text-fill-color: initial;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-actions button {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .btn-ghost {
            background: transparent;
            color: #a0a0b0;
            border: 1px solid #2a2a3a !important;
        }

        .btn-ghost:hover {
            background: #1a1a2a;
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        .btn-danger {
            background: #7f1d1d;
            color: #fff;
        }

        .btn-danger:hover {
            background: #991b1b;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #065f46;
            color: #fff;
        }

        .btn-success:hover {
            background: #047857;
            transform: translateY(-2px);
        }

        /* ── СТАТИСТИКА ── */
        .stats-bar {
            max-width: 1400px;
            margin: 0 auto 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            padding: 0 10px;
        }

        .stat-card {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 14px 18px;
        }

        .stat-card .label {
            color: #6b6b80;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
            color: #fff;
        }

        .stat-card .sub {
            color: #6b6b80;
            font-size: 12px;
            margin-top: 2px;
        }

        /* ── ОСНОВНАЯ СЕТКА ── */
        .main-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 25px;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── ЛЕВАЯ КОЛОНКА ── */
        .editor-panel {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 24px;
        }

        .editor-panel .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid #2a2a3a;
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .editor-panel .tabs button {
            background: transparent;
            border: none;
            color: #6b6b80;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .editor-panel .tabs button.active {
            background: #2a2a3a;
            color: #fff;
        }

        .editor-panel .tabs button:hover {
            color: #fff;
        }

        /* ── НАСТРОЙКИ САЙТА ── */
        .site-settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .site-settings input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: #0d0d14;
            color: #e5e5e5;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .site-settings input:focus {
            outline: none;
            border-color: #f5576c;
        }

        .site-settings input::placeholder {
            color: #4a4a5a;
        }

        /* ── ЗАГРУЗКА ФАЙЛОВ ── */
        .file-upload-area {
            border: 2px dashed #2a2a3a;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .file-upload-area:hover {
            border-color: #f5576c;
            background: #1a1a2a;
        }

        .file-upload-area.dragover {
            border-color: #f093fb;
            background: #1a1a2a;
            transform: scale(1.02);
        }

        .file-upload-area input[type="file"] {
            display: none;
        }

        .file-upload-area .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .file-upload-area p {
            color: #6b6b80;
            font-size: 13px;
        }

        .file-upload-area .file-name {
            color: #f093fb;
            font-weight: 600;
            margin-top: 6px;
        }

        /* ── GITHUB ИМПОРТ ── */
        .github-import {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .github-import input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: #0d0d14;
            color: #e5e5e5;
            font-size: 13px;
        }

        .github-import input:focus {
            outline: none;
            border-color: #f5576c;
        }

        .github-import input::placeholder {
            color: #4a4a5a;
        }

        .github-import button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #24243e;
            color: #fff;
            white-space: nowrap;
        }

        .github-import button:hover {
            background: #3a3a5a;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            background: #0d0d14;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            color: #e5e5e5;
            resize: vertical;
            line-height: 1.6;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .editor-actions button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-deploy {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-deploy:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        .btn-deploy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-preview {
            background: #2a2a3a;
            color: #e5e5e5;
        }

        .btn-preview:hover {
            background: #3a3a4a;
        }

        /* ── ПРАВАЯ КОЛОНКА ── */
        .projects-panel {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 24px;
        }

        .projects-panel h3 {
            font-size: 15px;
            margin-bottom: 16px;
            color: #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .projects-panel h3 span {
            color: #6b6b80;
            font-weight: 400;
            font-size: 12px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }

        .project-list::-webkit-scrollbar {
            width: 4px;
        }

        .project-list::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }

        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #0d0d14;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .project-item:hover {
            border-color: #2a2a3a;
            background: #12121c;
        }

        .project-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .project-item .name {
            font-weight: 600;
            color: #e5e5e5;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-item .url {
            font-size: 11px;
            color: #6b6b80;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-item .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .project-item .actions button {
            background: transparent;
            border: none;
            color: #6b6b80;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .project-item .actions button:hover {
            background: #2a2a3a;
            color: #fff;
        }

        .project-item .actions .delete:hover {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .project-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
            margin-left: 8px;
        }

        /* ── РЕЗУЛЬТАТ ── */
        #result {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            display: none;
            font-size: 13px;
            line-height: 1.6;
        }

        #result.success {
            display: block;
            background: #064e3b;
            border: 1px solid #065f46;
            color: #6ee7b7;
        }

        #result.error {
            display: block;
            background: #4c0519;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
        }

        #result a {
            color: #6ee7b7;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid #6ee7b7;
        }

        #result a:hover {
            opacity: 0.8;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #4a4a5a;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 13px;
        }

        /* ── МОДАЛКА ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
        }

        .modal h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .modal p {
            color: #a0a0b0;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal .buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal .buttons button {
            padding: 8px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* ── АДАПТИВ ── */
        @media (max-width: 600px) {
            .header {
                padding: 12px 16px;
            }
            .logo {
                font-size: 20px;
            }
            .stats-bar {
                grid-template-columns: 1fr 1fr;
            }
            .editor-panel, .projects-panel {
                padding: 16px;
            }
            textarea {
                height: 200px;
            }
            .site-settings {
                grid-template-columns: 1fr;
            }
            .github-import {
                flex-direction: column;
            }
        }
    </style>
</head>

            divider: '<hr style="border:1px solid #ddd; margin:20px 0;" />',
            gallery: '<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:10px 0;"><img src="https://via.placeholder.com/200x150" style="width:100%; border-radius:6px;" /><img src="https://via.placeholder.com/200x150" style="width:100%; border-radius:6px;" /><img src="https://via.placeholder.com/200x150" style="width:100%; border-radius:6px;" /></div>',
            video: '<div style="position:relative; padding-bottom:56.25%; margin:10px 0;"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:8px;"></iframe></div>',
            card: '<div style="background:#f8f9fa; border-radius:12px; padding:20px; margin:10px 0; box-shadow:0 2px 8px rgba(0,0,0,0.1);"><h3 style="margin-bottom:8px;">Заголовок карточки</h3><p style="color:#666;">Текст карточки. Можно описать что угодно.</p></div>',
            list: '<ul style="text-align:left; max-width:400px; margin:10px auto; color:#333; font-size:16px; line-height:2;"><li>Пункт 1</li><li>Пункт 2</li><li>Пункт 3</li></ul>'
        };

        function insertBlock(type) {
            const block = blocks[type] || '';
            const cursor = codeTextarea.selectionStart;
            const text = codeTextarea.value;
            codeTextarea.value = text.slice(0, cursor) + '\n' + block + '\n' + text.slice(cursor);
            codeTextarea.focus();
            const newCursor = cursor + block.length + 2;
            codeTextarea.setSelectionRange(newCursor, newCursor);
            showResult(`✅ Блок "${type}" вставлен!`, 'success');
            setTimeout(() => resultDiv.style.display = 'none', 1500);
        }

        // ─── ЗАГРУЗКА ПРОЕКТОВ ───
        async function loadAllProjects() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pages?select=id,html_content,created_at&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error('Не удалось загрузить проекты');

                const data = await response.json();
                allProjects = data;
                deployCounter = data.length;

                renderProjects(data);
                updateStats(data.length);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        // ─── ОТОБРАЖЕНИЕ ПРОЕКТОВ ───
        function renderProjects(projects) {
            if (!projects || projects.length === 0) {
                projectList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Нет сайтов</p>
                        <p style="font-size:12px; color:#3a3a4a;">Создай первый сайт!</p>
                    </div>
                `;
                projectCounter.textContent = '0';
                return;
            }

            projectList.innerHTML = projects.map(p => {
                const url = `${window.location.origin}/page/${p.id}`;
                const time = new Date(p.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', year: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                });
                // Извлекаем название из <title> или берём первые символы
                const titleMatch = p.html_content.match(/<title>([^<]*)<\/title>/);
                const displayName = titleMatch ? titleMatch[1] : p.html_content.replace(/<[^>]*>/g, '').slice(0, 40) + '...';

                return `
                    <div class="project-item">
                        <div class="info" onclick="window.open('${url}', '_blank')">
                            <div class="name">${displayName}</div>
                            <div class="url">${url}</div>
                        </div>
                        <div class="actions">
                            <button onclick="copyUrl('${url}')" title="Копировать ссылку">📋</button>
                            <button class="delete" onclick="confirmDelete('${p.id}')" title="Удалить">🗑️</button>
                        </div>
                        <div class="status"></div>
                    </div>
                `;
            }).join('');

            projectCounter.textContent = projects.length;
        }

        // ─── ОБНОВЛЕНИЕ СТАТИСТИКИ ───
        function updateStats(count) {
            projectCount.textContent = count;
            deployCount.textContent = deployCounter;
        }

        // ─── КОПИРОВАТЬ ССЫЛКУ ───
        function copyUrl(url) {
            navigator.clipboard.writeText(url);
            showResult('✅ Ссылка скопирована!', 'success');
            setTimeout(() => resultDiv.style.display = 'none', 2000);
        }

        // ─── УДАЛЕНИЕ ───
        function confirmDelete(id) {
            deleteTargetId = id;
            document.getElementById('deleteMessage').textContent = 'Вы уверены, что хотите удалить этот сайт? Это действие нельзя отменить.';
            deleteModal.classList.add('active');
        }

        function closeDeleteModal() {
            deleteModal.classList.remove('active');
            deleteTargetId = null;
        }

        confirmDeleteBtn.addEventListener('click', async () => {
            if (!deleteTargetId) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pages?id=eq.${deleteTargetId}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error('Не удалось удалить');

                showResult('✅ Сайт успешно удалён!', 'success');
                closeDeleteModal();
                await loadAllProjects();
            } catch (error) {
                showResult(`❌ Ошибка: ${error.message}`, 'error');
            }
        });

        // ─── ЗАГРУЗКА ФАЙЛА ───
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            handleFile(file);
        });

        // Drag and Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            if (!file.name.endsWith('.html') && !file.name.endsWith('.htm')) {
                showResult('❌ Пожалуйста, загрузите HTML-файл', 'error');
                return;
            }

            fileName.textContent = `📄 ${file.name}`;
            uploadedFileName = file.name.replace('.html', '').replace('.htm', '');

            const reader = new FileReader();
            reader.onload = (e) => {
                codeTextarea.value = e.target.result;
                siteName.value = uploadedFileName || 'Новый сайт';
                showResult(`✅ Файл "${file.name}" загружен!`, 'success');
                setTimeout(() => resultDiv.style.display = 'none', 2000);
            };
            reader.readAsText(file);
        }

        // ─── ИМПОРТ ИЗ GITHUB ───
        async function importFromGitHub() {
            const url = githubUrl.value.trim();
            if (!url) {
                showResult('❌ Введите ссылку на GitHub файл (raw)', 'error');
                return;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Не удалось загрузить файл');
                const html = await response.text();

                // Извлекаем название из URL
                const nameMatch = url.match(/\/([^\/]+)\.html$/);
                const name = nameMatch ? nameMatch[1] : 'Импорт';

                codeTextarea.value = html;
                siteName.value = name;
                showResult(`✅ Файл из GitHub загружен!`, 'success');
                setTimeout(() => resultDiv.style.display = 'none', 2000);
            } catch (error) {
                showResult(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        // ─── ДЕПЛОЙ ───
        async function deploy() {
            let html = codeTextarea.value;
            if (!html.trim()) {
                showResult('❌ Введи HTML-код!', 'error');
                return;
            }

            const name = siteName.value.trim() || 'Без названия';
            if (!html.includes('<title>')) {
                html = html.replace('<head>', `<head><title>${name}</title>`);
            }

            let id = customId.value.trim();
            if (id) {
                const check = await fetch(`${SUPABASE_URL}/rest/v1/pages?id=eq.${id}&select=id`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const existing = await check.json();
                if (existing.length > 0) {
                    showResult('❌ Этот ID уже используется! Выбери другой.', 'error');
                    return;
                }
            }

            deployBtn.disabled = true;
            deployBtn.innerHTML = '<span class="loader"></span> Деплоим...';

            try {
                const body = { html_content: html };
                if (id) body.id = id;

                const response = await fetch(`${SUPABASE_URL}/rest/v1/pages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const newId = data[0]?.id;

                if (!newId) throw new Error('Не удалось получить ID страницы');

                const url = `${window.location.origin}/page/${newId}`;
                showResult(
                    `✅ <strong>Деплой успешен!</strong><br>
                     🔗 <a href="${url}" target="_blank">${url}</a><br>
                     📋 ID: <code>${newId}</code>`,
                    'success'
                );

                customId.value = '';
                await loadAllProjects();

            } catch (error) {
                showResult(`❌ Ошибка: ${error.message}`, 'error');
                console.error('Deploy error:', error);
            } finally {
                deployBtn.disabled = false;
                deployBtn.innerHTML = '🚀 Деплоить';
            }
        }

        // ─── ПРЕДПРОСМОТР ───
        function preview() {
            const html = codeTextarea.value;
            if (!html.trim()) {
                showResult('⚠️ Введи HTML-код для предпросмотра.', 'error');
                return;
            }
            previewFrame.srcdoc = html;
            document.getElementById('previewContainer').style.display = 'block';
            codeTextarea.style.display = 'none';
            document.getElementById('blocksContainer').style.display = 'none';
            switchTab('preview');
        }

        // ─── ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ───
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tabs button');
            tabs.forEach(b => b.classList.remove('active'));

            if (tab === 'code') {
                tabs[0].classList.add('active');
                codeTextarea.style.display = 'block';
                previewContainer.style.display = 'none';
                document.getElementById('blocksContainer').style.display = 'none';
            } else if (tab === 'preview') {
                tabs[1].classList.add('active');
                codeTextarea.style.display = 'none';
                previewContainer.style.display = 'block';
                document.getElementById('blocksContainer').style.display = 'none';
                previewFrame.srcdoc = codeTextarea.value;
            } else if (tab === 'blocks') {
                tabs[2].classList.add('active');
                codeTextarea.style.display = 'block';
                previewContainer.style.display = 'none';
                document.getElementById('blocksContainer').style.display = 'block';
            }
        }

        // ─── ОЧИСТКА ───
        function clearEditor() {
            codeTextarea.value = '';
            fileName.textContent = '';
            showResult('🗑️ Редактор очищен', '');
            setTimeout(() => resultDiv.style.display = 'none', 1500);
        }

        // ─── НОВЫЙ ПРОЕКТ ───
        function newProject() {
            const name = siteName.value || 'Новый сайт';
            codeTextarea.value = `<!DOCTYPE html>
        <html>
        <head>
            <title>${name}</title>
            <style>
                body { font-family: Arial; text-align: center; padding: 50px; background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
                h1 { font-size: 3em; }
            </style>
        </head>
        <body>
            <h1>⚡ HF Sites</h1>
            <p>Добро пожаловать на новый сайт!</p>
        </body>
        </html>`;
            customId.value = '';
            fileName.textContent = '';
            showResult('✨ Новый проект создан!', 'success');
            setTimeout(() => resultDiv.style.display = 'none', 2000);
        }

        // ─── ПОКАЗ РЕЗУЛЬТАТА ───
        function showResult(message, type) {
            resultDiv.className = type || '';
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
            if (!type) {
                resultDiv.style.display = 'none';
            }
        }

        // ─── АВТОСОХРАНЕНИЕ ───
        codeTextarea.addEventListener('input', () => {
            localStorage.setItem('hf_sites_code', codeTextarea.value);
        });
        siteName.addEventListener('input', () => {
            localStorage.setItem('hf_sites_name', siteName.value);
        });

        const savedCode = localStorage.getItem('hf_sites_code');
        if (savedCode) codeTextarea.value = savedCode;
        const savedName = localStorage.getItem('hf_sites_name');
        if (savedName) siteName.value = savedName;

        // ─── ГОРЯЧИЕ КЛАВИШИ ───
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                deploy();
            }
            if (e.ctrlKey && e.shiftKey && e.key === 'P') {
                e.preventDefault();
                preview();
            }
        });

        // ─── ЗАГРУЗКА ───
        loadAllProjects();
        console.log('⚡ HF Sites загружен!');
        console.log('📌 Ctrl+Enter — деплой');
        console.log('📌 Ctrl+Shift+P — предпросмотр');
        console.log('📁 Загрузка .html файлов — перетащи или нажми на зону');
        console.log('📥 Импорт с GitHub — вставь ссылку raw');
        console.log('🗑️ Удаление проектов — кнопка корзины');
        console.log('📝 Свой ID — поле "Свой ID"');
    </script>

</body>
</html>
