<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HF Sites — платформа для деплоя</title>
    <style>
        /* ── ОСНОВНЫЕ СТИЛИ ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0f;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 20px;
        }

        /* ── ШАПКА ── */
        .header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #14141e;
            border-radius: 16px;
            border: 1px solid #2a2a3a;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 32px;
            -webkit-text-fill-color: initial;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-actions button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-ghost {
            background: transparent;
            color: #a0a0b0;
            border: 1px solid #2a2a3a !important;
        }

        .btn-ghost:hover {
            background: #1a1a2a;
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        /* ── СТАТИСТИКА ── */
        .stats-bar {
            max-width: 1400px;
            margin: 0 auto 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 10px;
        }

        .stat-card {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 16px 20px;
        }

        .stat-card .label {
            color: #6b6b80;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
            color: #fff;
        }

        .stat-card .sub {
            color: #6b6b80;
            font-size: 13px;
            margin-top: 2px;
        }

        /* ── ОСНОВНАЯ СЕТКА ── */
        .main-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── ЛЕВАЯ КОЛОНКА (РЕДАКТОР) ── */
        .editor-panel {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 24px;
        }

        .editor-panel .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid #2a2a3a;
            padding-bottom: 12px;
        }

        .editor-panel .tabs button {
            background: transparent;
            border: none;
            color: #6b6b80;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .editor-panel .tabs button.active {
            background: #2a2a3a;
            color: #fff;
        }

        .editor-panel .tabs button:hover {
            color: #fff;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background: #0d0d14;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            color: #e5e5e5;
            resize: vertical;
            line-height: 1.6;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }

        .editor-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .editor-actions button {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-deploy {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-deploy:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        .btn-deploy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-preview {
            background: #2a2a3a;
            color: #e5e5e5;
        }

        .btn-preview:hover {
            background: #3a3a4a;
        }

        /* ── ПРАВАЯ КОЛОНКА (ПРОЕКТЫ) ── */
        .projects-panel {
            background: #14141e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 24px;
        }

        .projects-panel h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .projects-panel h3 span {
            color: #6b6b80;
            font-weight: 400;
            font-size: 13px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 600px;
            overflow-y: auto;
        }

        .project-list::-webkit-scrollbar {
            width: 4px;
        }

        .project-list::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }

        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0d0d14;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .project-item:hover {
            border-color: #2a2a3a;
            background: #12121c;
        }

        .project-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .project-item .name {
            font-weight: 600;
            color: #e5e5e5;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-item .url {
            font-size: 12px;
            color: #6b6b80;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-item .time {
            font-size: 11px;
            color: #4a4a5a;
            white-space: nowrap;
            margin-left: 12px;
        }

        .project-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .project-item .status.building {
            background: #eab308;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── РЕЗУЛЬТАТ ДЕПЛОЯ ── */
        #result {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        #result.success {
            display: block;
            background: #064e3b;
            border: 1px solid #065f46;
            color: #6ee7b7;
        }

        #result.error {
            display: block;
            background: #4c0519;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
        }

        #result a {
            color: #6ee7b7;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid #6ee7b7;
        }

        #result a:hover {
            opacity: 0.8;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── ПУСТОЕ СОСТОЯНИЕ ── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #4a4a5a;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ── АДАПТИВ ── */
        @media (max-width: 600px) {
            .header {
                padding: 12px 16px;
            }
            .logo {
                font-size: 20px;
            }
            .stats-bar {
                grid-template-columns: 1fr 1fr;
            }
            .editor-panel, .projects-panel {
                padding: 16px;
            }
            textarea {
                height: 250px;
            }
        }
    </style>
</head>
<body>

    <!-- ═══ ШАПКА ═══ -->
    <header class="header">
        <div class="logo">
            <span>⚡</span> HF Sites
        </div>
        <div class="header-actions">
            <button class="btn-ghost" onclick="loadAllProjects()">🔄 Обновить</button>
            <button class="btn-primary" onclick="document.getElementById('code').focus()">+ Новый проект</button>
        </div>
    </header>

    <!-- ═══ СТАТИСТИКА ═══ -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="label">Проекты</div>
            <div class="value" id="projectCount">0</div>
            <div class="sub">всего</div>
        </div>
        <div class="stat-card">
            <div class="label">Деплои</div>
            <div class="value" id="deployCount">0</div>
            <div class="sub">за всё время</div>
        </div>
        <div class="stat-card">
            <div class="label">Статус</div>
            <div class="value" style="font-size:16px; color:#22c55e;">✅ Работает</div>
            <div class="sub">Supabase + Vercel</div>
        </div>
    </div>

    <!-- ═══ ОСНОВНАЯ СЕТКА ═══ -->
    <div class="main-grid">

        <!-- ЛЕВАЯ КОЛОНКА: РЕДАКТОР -->
        <div class="editor-panel">
            <div class="tabs">
                <button class="active" onclick="switchTab('code')">📝 Код</button>
                <button onclick="switchTab('preview')">👁️ Превью</button>
            </div>

            <textarea id="code" spellcheck="false"><!DOCTYPE html>
<html>
<head>
    <title>HF Sites</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        h1 { font-size: 3em; }
    </style>
</head>
<body>
    <h1>⚡ HF Sites</h1>
    <p>Мой первый сайт на HF Sites!</p>
</body>
</html></textarea>

            <div id="previewContainer" style="display:none; height:400px; border:1px solid #2a2a3a; border-radius:10px; overflow:hidden; background:#fff;">
                <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
            </div>

            <div class="editor-actions">
                <button class="btn-deploy" id="deployBtn" onclick="deploy()">
                    🚀 Деплоить
                </button>
                <button class="btn-preview" onclick="preview()">
                    👁️ Предпросмотр
                </button>
                <button class="btn-preview" onclick="clearEditor()">
                    🗑️ Очистить
                </button>
            </div>

            <div id="result"></div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА: ПРОЕКТЫ -->
        <div class="projects-panel">
            <h3>
                📁 Проекты
                <span id="projectCounter">0</span>
            </h3>
            <div class="project-list" id="projectList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>Нет проектов</p>
                    <p style="font-size:12px; color:#3a3a4a;">Создай первый деплой!</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ─── КОНФИГ SUPABASE ───
        const SUPABASE_URL = 'https://uojitzszwmugkzecwdbt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvaml0enN6d211Z2t6ZWN3ZGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODAyNDQsImV4cCI6MjA5OTg1NjI0NH0.4aL0xfYyP_sKQDAc15mCnihWHrit1MEl86FmxI5Amrs';

        // ─── ЭЛЕМЕНТЫ ───
        const codeTextarea = document.getElementById('code');
        const resultDiv = document.getElementById('result');
        const deployBtn = document.getElementById('deployBtn');
        const projectList = document.getElementById('projectList');
        const projectCounter = document.getElementById('projectCounter');
        const projectCount = document.getElementById('projectCount');
        const deployCount = document.getElementById('deployCount');
        const previewContainer = document.getElementById('previewContainer');
        const previewFrame = document.getElementById('previewFrame');

        let allProjects = [];
        let deployCounter = 0;

        // ─── ЗАГРУЗКА ПРОЕКТОВ ───
        async function loadAllProjects() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pages?select=id,html_content,created_at&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error('Не удалось загрузить проекты');

                const data = await response.json();
                allProjects = data;
                deployCounter = data.length;

                renderProjects(data);
                updateStats(data.length);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        // ─── ОТОБРАЖЕНИЕ ПРОЕКТОВ ───
        function renderProjects(projects) {
            if (!projects || projects.length === 0) {
                projectList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Нет проектов</p>
                        <p style="font-size:12px; color:#3a3a4a;">Создай первый деплой!</p>
                    </div>
                `;
                projectCounter.textContent = '0';
                return;
            }

            projectList.innerHTML = projects.map(p => {
                const url = `${window.location.origin}/page/${p.id}`;
                const time = new Date(p.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', year: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                });
                // Обрезаем HTML для отображения
                const previewText = p.html_content.replace(/<[^>]*>/g, '').slice(0, 50) + '...';

                return `
                    <div class="project-item" onclick="window.open('${url}', '_blank')">
                        <div class="info">
                            <div class="name">${previewText || 'Без названия'}</div>
                            <div class="url">${url}</div>
                        </div>
                        <div class="time">${time}</div>
                        <div class="status"></div>
                    </div>
                `;
            }).join('');

            projectCounter.textContent = projects.length;
        }

        // ─── ОБНОВЛЕНИЕ СТАТИСТИКИ ───
        function updateStats(count) {
            projectCount.textContent = count;
            deployCount.textContent = deployCounter;
        }

        // ─── ДЕПЛОЙ ───
        async function deploy() {
            const html = codeTextarea.value;
            if (!html.trim()) {
                showResult('❌ Введи HTML-код!', 'error');
                return;
            }

            deployBtn.disabled = true;
            deployBtn.innerHTML = '<span class="loader"></span> Деплоим...';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ html_content: html })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const id = data[0]?.id;

                if (!id) throw new Error('Не удалось получить ID страницы');

                const url = `${window.location.origin}/page/${id}`;
                showResult(
                    `✅ <strong>Деплой успешен!</strong><br>
                     🔗 <a href="${url}" target="_blank">${url}</a><br>
                     📋 ID: <code>${id}</code>`,
                    'success'
                );

                // Обновляем список проектов
                await loadAllProjects();

            } catch (error) {
                showResult(`❌ Ошибка: ${error.message}`, 'error');
                console.error('Deploy error:', error);
            } finally {
                deployBtn.disabled = false;
                deployBtn.innerHTML = '🚀 Деплоить';
            }
        }

        // ─── ПРЕДПРОСМОТР ───
        function preview() {
            const html = codeTextarea.value;
            if (!html.trim()) {
                showResult('⚠️ Введи HTML-код для предпросмотра.', 'error');
                return;
            }
            previewFrame.srcdoc = html;
            document.getElementById('previewContainer').style.display = 'block';
            codeTextarea.style.display = 'none';
            switchTab('preview');
        }

        // ─── ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ───
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tabs button');
            tabs.forEach(b => b.classList.remove('active'));

            if (tab === 'code') {
                tabs[0].classList.add('active');
                codeTextarea.style.display = 'block';
                previewContainer.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                codeTextarea.style.display = 'none';
                previewContainer.style.display = 'block';
                // Обновляем превью
                previewFrame.srcdoc = codeTextarea.value;
            }
        }

        // ─── ОЧИСТКА ───
        function clearEditor() {
            codeTextarea.value = '';
            showResult('🗑️ Редактор очищен', '');
        }

        // ─── ПОКАЗ РЕЗУЛЬТАТА ───
        function showResult(message, type) {
            resultDiv.className = type || '';
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
            if (!type) {
                resultDiv.style.display = 'none';
            }
        }

        // ─── ЗАГРУЗКА ПРИ СТАРТЕ ───
        loadAllProjects();

        // ─── СОХРАНЕНИЕ В LOCALSTORAGE ───
        // Автосохранение кода
        codeTextarea.addEventListener('input', () => {
            localStorage.setItem('hf_sites_code', codeTextarea.value);
        });

        // Восстановление кода
        const savedCode = localStorage.getItem('hf_sites_code');
        if (savedCode) {
            codeTextarea.value = savedCode;
        }

        // ─── ГОРЯЧИЕ КЛАВИШИ ───
        document.addEventListener('keydown', (e) => {
            // Ctrl+Enter = Деплой
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                deploy();
            }
            // Ctrl+Shift+P = Предпросмотр
            if (e.ctrlKey && e.shiftKey && e.key === 'P') {
                e.preventDefault();
                preview();
            }
        });

        console.log('⚡ HF Sites загружен!');
        console.log('📌 Ctrl+Enter — деплой');
        console.log('📌 Ctrl+Shift+P — предпросмотр');
    </script>

</body>
</html>
