<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚀 My Vercel on Supabase</title>
    <style>
        /* ── Стили ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 820px;
            width: 100%;
            transition: transform 0.2s;
        }

        h1 {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.4em;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 28px;
            font-size: 1.05em;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            resize: vertical;
            transition: border-color 0.25s, box-shadow 0.25s;
            background: #fafafa;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            background: #ffffff;
        }

        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 140px;
        }

        .btn-deploy {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        .btn-deploy:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-deploy:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-preview {
            background: #f3f4f6;
            color: #1f2937;
        }

        .btn-preview:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 24px;
            padding: 18px 22px;
            border-radius: 12px;
            display: none;
            font-size: 0.98em;
            line-height: 1.6;
            word-break: break-all;
        }

        #result.success {
            display: block;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        #result.error {
            display: block;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        #result a {
            color: #065f46;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid #34d399;
        }

        #result a:hover {
            opacity: 0.75;
        }

        #result code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .stats {
            margin-top: 22px;
            padding: 14px 18px;
            background: #f9fafb;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            color: #6b7280;
            font-size: 0.92em;
            flex-wrap: wrap;
            gap: 8px;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .badge {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            font-size: 0.75em;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* ── Адаптив ── */
        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }
            h1 {
                font-size: 1.8em;
            }
            textarea {
                height: 220px;
            }
            button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 My Vercel</h1>
        <p class="subtitle">
            Деплойни HTML за 2 секунды
            <span class="badge">Supabase + Vercel</span>
        </p>

        <textarea id="code" spellcheck="false"><!DOCTYPE html>
<html>
<head>
    <title>Моя страница</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f0f9ff; }
        h1 { color: #3b82f6; }
    </style>
</head>
<body>
    <h1>🚀 Привет, мир!</h1>
    <p>Этот сайт задеплоен через <strong>My Vercel</strong></p>
    <p>✨ Работает на Supabase</p>
</body>
</html></textarea>

        <div class="button-group">
            <button class="btn-deploy" id="deployBtn" onclick="deploy()">
                🚀 Деплоить
            </button>
            <button class="btn-preview" onclick="preview()">
                👁️ Предпросмотр
            </button>
        </div>

        <div id="result"></div>

        <div class="stats">
            <span>📊 Статус: <span id="status">Готов к деплою</span></span>
            <span>📝 Символов: <span id="charCount">0</span></span>
        </div>
    </div>

    <script>
        // ─── ТВОИ ДАННЫЕ SUPABASE ───
        const SUPABASE_URL = 'https://uojitzszwmugkzecwdbt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvaml0enN6d211Z2t6ZWN3ZGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODAyNDQsImV4cCI6MjA5OTg1NjI0NH0.4aL0xfYyP_sKQDAc15mCnihWHrit1MEl86FmxI5Amrs';
        // ─────────────────────────────

        const codeTextarea = document.getElementById('code');
        const resultDiv = document.getElementById('result');
        const statusSpan = document.getElementById('status');
        const charCountSpan = document.getElementById('charCount');
        const deployBtn = document.getElementById('deployBtn');

        // Счётчик символов
        codeTextarea.addEventListener('input', () => {
            charCountSpan.textContent = codeTextarea.value.length;
        });
        charCountSpan.textContent = codeTextarea.value.length;

        // Предпросмотр
        function preview() {
            const html = codeTextarea.value;
            if (!html.trim()) {
                showResult('⚠️ Введи HTML-код для предпросмотра.', 'error');
                return;
            }
            const win = window.open('', '_blank');
            win.document.write(html);
            win.document.close();
        }

        // Деплой
        async function deploy() {
            const html = codeTextarea.value;
            if (!html.trim()) {
                showResult('❌ Введи HTML-код!', 'error');
                return;
            }

            // Блокируем кнопку
            deployBtn.disabled = true;
            deployBtn.innerHTML = '<span class="loader"></span> Деплоим...';
            statusSpan.textContent = '⏳ Отправка в Supabase...';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ html_content: html })
                });

                if (!response.ok) {
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const errData = await response.json();
                        if (errData.message) errorMsg += `: ${errData.message}`;
                    } catch (_) { /* ignore */ }
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const id = data[0]?.id;

                if (!id) {
                    throw new Error('Ответ от сервера не содержит ID страницы.');
                }

                const url = `${window.location.origin}/page/${id}`;
                showResult(
                    `✅ <strong>Страница успешно задеплоена!</strong><br>
                     🔗 Ссылка: <a href="${url}" target="_blank">${url}</a><br>
                     📋 ID: <code>${id}</code>`,
                    'success'
                );
                statusSpan.textContent = '✅ Деплой успешен!';

            } catch (error) {
                showResult(`❌ Ошибка: ${error.message}`, 'error');
                statusSpan.textContent = '❌ Ошибка деплоя';
                console.error('Deploy error:', error);
            } finally {
                deployBtn.disabled = false;
                deployBtn.innerHTML = '🚀 Деплоить';
            }
        }

        function showResult(message, type) {
            resultDiv.className = type;
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
        }
    </script>

</body>
</html>
